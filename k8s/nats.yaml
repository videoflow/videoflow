# In-cluster NATS JetStream server for videoflow. Apply once per namespace before
# deploying a flow that points --nats at nats://nats.<namespace>.svc:4222.
#
#   kubectl create namespace videoflow
#   kubectl apply -n videoflow -f k8s/nats.yaml
#
# For production, prefer the official NATS Helm chart (clustering, persistence,
# resource tuning). This single-replica Deployment is meant for dev/test clusters
# (kind/minikube). Note: raises max_payload to 8MB so uncompressed HD frames can
# travel inline; for larger frames use the external blob store instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
data:
  nats.conf: |
    port: 4222
    http: 8222
    max_payload: 8MB
    jetstream {
      store_dir: "/data/jetstream"
      max_memory_store: 1GB
      max_file_store: 10GB
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitor
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  labels:
    app: nats
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      name: client
    - port: 8222
      targetPort: 8222
      name: monitor
