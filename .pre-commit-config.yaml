# Pre-commit hooks for videoflow.
#   pre-commit install                      # enable the commit-stage hooks
#   pre-commit install --hook-type pre-push # enable the pytest pre-push hook
#
# Commit stage: fast file-hygiene checks, ruff lint (auto-fix), and mypy type checks.
# Push stage: the full pytest suite (too slow to run on every commit; it also needs a
# local NATS JetStream server for the integration tests).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # docs/public/ is Sphinx output, rewritten wholesale by the docs hook below.
        # Reformatting it only produces churn the next build undoes.
        exclude: ^docs/public/
      - id: end-of-file-fixer
        exclude: ^docs/public/
      - id: check-yaml
        # k8s manifests bundle several resources per file with `---` separators.
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-added-large-files
        # Default is 500kB, which the built white-paper PDF (~800kB, and growing
        # with each figure added) exceeds. 2MB still catches the mistakes this
        # hook is for — committed model weights, datasets, sample videos.
        args: [--maxkb=2048]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      # Run mypy through uv so it uses the project environment (real deps like
      # redis/opencv/nats and the [tool.mypy] config in pyproject.toml) rather than
      # an isolated env with a hand-maintained, drift-prone stub list.
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        files: ^videoflow/
        pass_filenames: false

      # docs/public/ is the published HTML (Firebase Hosting serves it) and is
      # committed, so it has to be rebuilt in the same commit that changes the
      # sources it was generated from. `files:` limits this to docs/source/ edits;
      # `pass_filenames: false` because sphinx-build takes the source tree, not a
      # file list. The rebuilt output is staged so it lands in this commit.
      - id: docs
        name: sphinx docs (docs/source -> docs/public)
        entry: bash -c './scripts/build-docs.sh && git add docs/public'
        language: system
        files: ^docs/source/
        pass_filenames: false

      - id: pytest
        name: pytest (unit suite)
        # tests/integration/ needs a live NATS JetStream server, so it is excluded
        # here — run it explicitly with `uv run pytest tests/integration`.
        entry: uv run pytest --ignore=tests/integration
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
